<p><strong>הנהלה:</strong> רפואית (מנהל בית"ח) + סיעוד (מנהלת סיעוד) + אדמיניסטרטיבית (אמרכל)</p>
<p>בית"ח כללי = מערכת משולבת, לא אוסף מחלקות נפרדות.</p>

<p>ארגונים שאינם ממשלה ואינם עסקיים. פועלים <strong>ללא כוונת רווח</strong> למטרות ציבוריות וחברתיות.</p>
<p><strong>שמות:</strong> מלכ"ר | עמותה | חל"צ | NGO</p>
<p>⭐ <strong>מותר להרוויח, אסור לחלק רווחים לבעלים!</strong> הרווחים חוזרים לפעילות.</p>
<h4 class="font-bold text-base text-green-800">למה צריך מגזר שלישי?</h4>
<p>מצוקות ללא מענה | יוזמות קהילתיות | פתרונות גמישים | פחות בירוקרטיה | יותר נגישות</p>
<h4 class="font-bold text-base text-green-800">⭐⭐⭐ מאפייני המגזר</h4>

<p><strong>א. מתן שירותים</strong> – בריאות, רווחה, חינוך, תרבות</p>
<p><strong>ב. סנגור ושינוי מדיניות</strong> – לובי, מחקרים, תקשורת, בג"ץ</p>
<p><strong>ג. ארגוני חברים וסיוע עצמי</strong> – גמלאים, הורים, עולים</p>
<p>⭐ ארגון אחד יכול לבצע כמה תפקידים במקביל!</p>

<p><strong>בתי"ח:</strong> הדסה, שערי צדק, לניאדו, אלי"ן, הרצוג, האיטלקי, סנט לואי</p>

      {q:'מה פרדוקס ההצלחה?',options:['הצלחה גורמת לפשיטת רגל','ככל שמצליח יותר → צריך יותר משאבים','הצלחה = ביטול הארגון','אין פרדוקס'],answer:1},
      {q:'כמה % תרומות מחו"ל בישראל?',options:['10%','1/3','2/3','90%'],answer:2},
      {q:'מה המגזר הליברלי (ארה"ב)?',options:['מגזר שלישי קטן','מגזר שלישי גדול מאוד','ממשלה מספקת הכל','אין מגזר שלישי'],answer:1},
      {q:'איזה בית"ח שייך למגזר השלישי?',options:['שיבא','אסותא','הדסה','רמב"ם'],answer:2},
    ]
  }

];

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="tab-"]').forEach(s=>s.classList.add('hidden'));
    document.getElementById('tab-'+btn.dataset.tab).classList.remove('hidden');
  });
});

function renderTopics(){
  document.getElementById('topics-grid').innerHTML=topicsData.map(t=>`
    <button type="button" class="topic-card rounded-2xl p-4 text-right shadow-md" style="background:${t.color}" onclick="openSummary('${t.id}')">
      <h3 class="text-white font-bold text-xs mb-1">${t.title}</h3>
      <p class="text-white/75 text-xs">לחץ לסיכום ←</p>
    </button>`).join('');
}
function openSummary(id){
  const t=topicsData.find(x=>x.id===id);
  document.getElementById('modal-title').textContent=t.title;
  document.getElementById('modal-content').innerHTML=t.summary;
  document.getElementById('summary-modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('summary-modal').classList.add('hidden');
  document.body.style.overflow='';
}
document.getElementById('summary-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

let currentFCTopic=0;
function renderFCTopicBtns(){
  document.getElementById('fc-topic-btns').innerHTML=topicsData.map((t,i)=>
    `<button type="button" class="px-2 py-1 rounded-full text-xs font-medium transition" style="${i===currentFCTopic?'background:'+t.color+';color:#fff':'background:#f3f4f6;color:#374151'}" onclick="switchFCTopic(${i})">${t.title.split('–')[1]?.trim()||t.title}</button>`
  ).join('');
}
function switchFCTopic(i){currentFCTopic=i;renderFCTopicBtns();renderFlashcards();}
function renderFlashcards(){
  const cards=topicsData[currentFCTopic].flashcards,color=topicsData[currentFCTopic].color;
  document.getElementById('fc-grid').innerHTML=cards.map(c=>`
    <button type="button" class="flip-card" style="aspect-ratio:4/3" onclick="this.classList.toggle('is-flipped')">
      <div class="flip-inner">
        <div class="flip-front shadow-lg" style="background:${color}"><p class="text-white font-bold text-xs px-2">${c[0]}</p></div>
        <div class="flip-back shadow-lg border-2" style="background:${color}11;border-color:${color}"><p class="text-gray-800 text-xs font-medium px-2">${c[1]}</p></div>
      </div></button>`).join('');
}

let quizQuestions=[],currentQ=0,score=0,quizCount=20,quizAnswers=[];
function renderQuizSetup(){
  document.getElementById('quiz-topic-checks').innerHTML=topicsData.map((t,i)=>`
    <label class="flex items-center gap-2 p-2 rounded-xl cursor-pointer border-2 transition hover:shadow-md" style="border-color:${t.color}33;background:${t.color}0d">
      <input type="checkbox" class="w-4 h-4 rounded" style="accent-color:${t.color}" data-topic-idx="${i}" checked>
      <span class="font-medium text-xs" style="color:${t.color}">${t.title}</span>
    </label>`).join('');
  document.getElementById('quiz-count-btns').innerHTML=[10,20,30,40,60,80,100].map(c=>
    `<button type="button" class="px-4 py-2 rounded-lg font-bold transition text-sm ${c===quizCount?'bg-indigo-600 text-white':'bg-gray-100 text-gray-700 hover:bg-gray-200'}" onclick="setQuizCount(${c})">${c}</button>`
  ).join('');
}
function setQuizCount(n){quizCount=n;renderQuizSetup();}
function startQuiz(){
  const checks=document.querySelectorAll('#quiz-topic-checks input[type=checkbox]');
  let sel=[];
  checks.forEach(cb=>{if(cb.checked)sel.push(parseInt(cb.dataset.topicIdx));});
  if(!sel.length){document.getElementById('quiz-error').textContent='יש לבחור לפחות נושא אחד';document.getElementById('quiz-error').classList.remove('hidden');return;}
  document.getElementById('quiz-error').classList.add('hidden');
  let allQ=[];
  sel.forEach(idx=>topicsData[idx].questions.forEach(q=>allQ.push({...q,topicIdx:idx})));
  allQ.sort(()=>Math.random()-0.5);
  quizQuestions=allQ.slice(0,Math.min(quizCount,allQ.length));
  currentQ=0;score=0;quizAnswers=new Array(quizQuestions.length).fill(0);
  document.getElementById('quiz-setup').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  document.getElementById('quiz-result').classList.add('hidden');
  document.getElementById('quiz-content').classList.remove('hidden');
  renderQuestion();
}
function renderQuestion(){
  const q=quizQuestions[currentQ],color=topicsData[q.topicIdx].color;
  const ts=topicsData[q.topicIdx].title.split('–')[1]?.trim()||topicsData[q.topicIdx].title;
  document.getElementById('quiz-progress').innerHTML=`
    <div class="flex justify-between items-center mb-2">
      <span class="font-bold text-sm">שאלה ${currentQ+1} / ${quizQuestions.length}</span>
      <span class="text-xs px-2 py-1 rounded-full text-white" style="background:${color}">${ts}</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2"><div class="h-2 rounded-full transition-all" style="width:${(currentQ/quizQuestions.length)*100}%;background:${color}"></div></div>`;
  updateQuizMap();
  const wa=quizAnswers[currentQ]!==0;
  document.getElementById('quiz-content').innerHTML=`
    <p class="text-base font-bold mb-5">${q.q}</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      ${q.options.map((o,i)=>`<button type="button" class="quiz-option p-3 rounded-xl border-2 border-gray-200 font-medium text-right text-sm" onclick="selectAnswer(${i})" ${wa?'disabled':''}>${o}</button>`).join('')}
    </div>`;
  if(wa){
    const btns=document.querySelectorAll('.quiz-option');
    btns[q.answer].classList.add('correct');
    if(quizAnswers[currentQ]<0){const wi=Math.abs(quizAnswers[currentQ])-2;if(wi>=0&&wi<btns.length)btns[wi].classList.add('wrong');}
  }
  document.getElementById('prev-q-btn').disabled=currentQ===0;
  document.getElementById('next-q-btn').disabled=!wa;
}
function updateQuizMap(){
  document.getElementById('quiz-map-inline').innerHTML=quizAnswers.map((ans,i)=>{
    const bg=ans>0?'#10b981':ans<0?'#ef4444':i===currentQ?'#6366f1':'#e5e7eb';
    const tc=(ans!==0||i===currentQ)?'white':'#6b7280';
    return `<button type="button" class="w-6 h-6 rounded flex items-center justify-center font-bold text-xs" style="background:${bg};color:${tc}" onclick="goToQuestion(${i})">${ans>0?'✓':ans<0?'✗':(i+1)}</button>`;
  }).join('');
}
function goToQuestion(idx){currentQ=idx;renderQuestion();}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();}}
function nextQuestion(){if(currentQ<quizQuestions.length-1){currentQ++;renderQuestion();}else if(quizAnswers.every(a=>a!==0))showResult();}
function selectAnswer(idx){
  if(quizAnswers[currentQ]!==0)return;
  const correct=quizQuestions[currentQ].answer;
  const btns=document.querySelectorAll('.quiz-option');
  btns[correct].classList.add('correct');
  if(idx===correct){score++;quizAnswers[currentQ]=1;}
  else{btns[idx].classList.add('wrong');quizAnswers[currentQ]=-(idx+2);}
  btns.forEach(b=>b.disabled=true);
  updateQuizMap();
  document.getElementById('next-q-btn').disabled=false;
  setTimeout(()=>{if(currentQ===quizQuestions.length-1)showResult();},900);
}
function skipQuestion(){
  if(quizAnswers[currentQ]!==0)return;
  if(currentQ<quizQuestions.length-1){currentQ++;renderQuestion();}
  else{if(quizAnswers.filter((a,i)=>i!==currentQ&&a!==0).length===quizQuestions.length-1)showResult();}
}
function showResult(){
  document.getElementById('quiz-content').classList.add('hidden');
  document.getElementById('quiz-progress').innerHTML='';
  document.getElementById('quiz-map-inline').innerHTML='';
  document.getElementById('quiz-result').classList.remove('hidden');
  const answered=quizAnswers.filter(a=>a!==0).length,skipped=quizQuestions.length-answered;
  const pct=answered>0?Math.round((score/answered)*100):0;
  const emoji=pct>=90?'🏆':pct>=75?'🎉':pct>=60?'👍':'📚';
  document.getElementById('score-text').innerHTML=`${emoji} ציון: <strong>${score}</strong> מתוך ${answered} (${pct}%)${skipped>0?' | דילגת על '+skipped:''}`;
  document.getElementById('quiz-map').innerHTML='<div class="flex flex-wrap gap-1.5 justify-center">'+
    quizAnswers.map((ans,i)=>`<div class="w-6 h-6 rounded flex items-center justify-center font-bold text-white text-xs" style="background:${ans>0?'#10b981':ans<0?'#ef4444':'#d1d5db'}">${ans>0?'✓':ans<0?'✗':'—'}</div>`).join('')+'</div>';
}
function backToSetup(){document.getElementById('quiz-container').classList.add('hidden');document.getElementById('quiz-setup').classList.remove('hidden');}
function restartQuiz(){startQuiz();}
